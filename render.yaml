services:
  - type: web
    name: almacenamiento-libros
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: almacenamiento-libros-db
          property: connectionString

databases:
  - name: almacenamiento-libros-db
