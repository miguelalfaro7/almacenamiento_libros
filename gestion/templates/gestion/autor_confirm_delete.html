{% extends 'gestion/base.html' %}

{% block title %}Eliminar autor{% endblock %}

{% block content %}
    <h2>Eliminar autor</h2>
    <p>¿Seguro que deseas eliminar a <strong>{{ autor.nombre }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
        <a class="secundario" href="{% url 'lista_autores' %}">Cancelar</a>
    </form>
{% endblock %}
